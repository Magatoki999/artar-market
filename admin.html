<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtAR Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0a06;--sepia:#c8a96e;--gold:#D4AF37;--rust:#b85c38;--border:rgba(200,169,110,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:#e8e0d0;font-family:'Shippori Mincho',serif;min-height:100vh;}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:40px 32px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-size:24px;font-weight:800;color:var(--gold);letter-spacing:0.15em;margin-bottom:4px;}
.login-sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.2em;margin-bottom:32px;}
.login-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(200,169,110,0.3);border-radius:8px;color:#fff;font-size:15px;padding:12px 16px;outline:none;font-family:'DM Mono',monospace;margin-bottom:12px;text-align:center;letter-spacing:0.1em;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:linear-gradient(135deg,#b8962e,var(--gold));color:#1a1208;border:none;border-radius:8px;padding:14px;font-family:'Shippori Mincho',serif;font-size:15px;font-weight:800;letter-spacing:0.12em;cursor:pointer;}
.login-err{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:18px;font-family:'DM Mono',monospace;}

/* ── DASHBOARD ── */
#dashboard{display:none;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(13,10,6,0.96);position:sticky;top:0;z-index:10;}
.header-logo{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:0.15em;}
.header-sub{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.2em;}
.logout-btn{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);background:none;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:6px 12px;cursor:pointer;letter-spacing:0.1em;}
.logout-btn:hover{color:rgba(255,255,255,0.6);}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 24px;overflow-x:auto;}
.tab{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.15em;color:rgba(255,255,255,0.3);padding:14px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:var(--sepia);border-bottom-color:var(--sepia);}
.tab:hover{color:rgba(255,255,255,0.6);}

/* ── CONTENT ── */
.content{padding:28px 24px;max-width:960px;margin:0 auto;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── STATS CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:18px 20px;}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;color:rgba(255,255,255,0.3);margin-bottom:8px;}
.stat-value{font-size:26px;font-weight:800;color:var(--gold);letter-spacing:0.04em;font-family:'DM Mono',monospace;}
.stat-unit{font-size:13px;color:rgba(200,169,110,0.5);margin-left:4px;}
.stat-warn{color:#ff9944;}

/* ── TABLE ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.25);text-align:left;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.08);}
.data-table td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top;color:rgba(255,255,255,0.7);}
.data-table tr:hover td{background:rgba(255,255,255,0.02);}
.mono{font-family:'DM Mono',monospace;font-size:11px;}
.badge-ok{display:inline-block;background:rgba(80,180,80,0.12);color:#6dbb6d;border:1px solid rgba(80,180,80,0.25);border-radius:4px;padding:1px 7px;font-family:'DM Mono',monospace;font-size:10px;}
.badge-ng{display:inline-block;background:rgba(255,100,100,0.12);color:#ff8080;border:1px solid rgba(255,100,100,0.2);border-radius:4px;padding:1px 7px;font-family:'DM Mono',monospace;font-size:10px;}
.badge-pend{display:inline-block;background:rgba(200,169,110,0.1);color:rgba(200,169,110,0.7);border:1px solid rgba(200,169,110,0.2);border-radius:4px;padding:1px 7px;font-family:'DM Mono',monospace;font-size:10px;}
.tx-link{color:var(--sepia);font-family:'DM Mono',monospace;font-size:10px;text-decoration:none;}
.tx-link:hover{text-decoration:underline;}

/* ── ARTWORK BREAKDOWN ── */
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:16px;}
.breakdown-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px 14px;}
.breakdown-name{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.breakdown-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--sepia);}
.breakdown-amount{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;}

/* ── ARTISTS TABLE ── */
.artist-thumb{width:36px;height:36px;border-radius:4px;object-fit:cover;background:#222;border:1px solid rgba(255,255,255,0.1);}
.artist-name{font-weight:600;color:rgba(255,255,255,0.85);}
.artist-artwork{color:rgba(200,169,110,0.7);font-size:11px;}

/* ── MISC ── */
.section-title{font-size:15px;font-weight:800;color:var(--sepia);letter-spacing:0.1em;margin-bottom:16px;}
.loading-msg{text-align:center;padding:48px;font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.2);letter-spacing:0.2em;}
.load-more-btn{display:block;margin:20px auto 0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.4);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;padding:10px 24px;cursor:pointer;}
.load-more-btn:hover{border-color:var(--sepia);color:var(--sepia);}
.refresh-btn{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);background:none;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:5px 10px;cursor:pointer;margin-left:12px;letter-spacing:0.1em;}
.refresh-btn:hover{color:var(--sepia);border-color:var(--sepia);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ArtAR</div>
    <div class="login-sub">ADMIN DASHBOARD</div>
    <input class="login-input" type="password" id="pwInput" placeholder="PASSWORD" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div>
      <div class="header-logo">ArtAR</div>
      <div class="header-sub">ADMIN DASHBOARD</div>
    </div>
    <button class="logout-btn" id="logoutBtn">LOGOUT</button>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="stats">概要・統計</button>
    <button class="tab" data-tab="payments">売上一覧</button>
    <button class="tab" data-tab="artists">登録作品</button>
  </div>

  <div class="content">

    <!-- 概要・統計 -->
    <div class="tab-panel active" id="tab-stats">
      <div id="statsContent"><div class="loading-msg">読み込み中...</div></div>
    </div>

    <!-- 売上一覧 -->
    <div class="tab-panel" id="tab-payments">
      <div style="display:flex;align-items:center;margin-bottom:16px;">
        <div class="section-title" style="margin-bottom:0;">売上一覧</div>
        <button class="refresh-btn" onclick="loadPayments(true)">↻ 更新</button>
      </div>
      <div id="paymentsContent"><div class="loading-msg">読み込み中...</div></div>
      <button class="load-more-btn" id="loadMoreBtn" style="display:none;" onclick="loadMore()">さらに読み込む</button>
    </div>

    <!-- 登録作品 -->
    <div class="tab-panel" id="tab-artists">
      <div style="display:flex;align-items:center;margin-bottom:16px;">
        <div class="section-title" style="margin-bottom:0;">登録作品一覧</div>
        <button class="refresh-btn" onclick="loadArtists()">↻ 更新</button>
      </div>
      <div id="artistsContent"><div class="loading-msg">読み込み中...</div></div>
    </div>

  </div>
</div>

<script>
let pw = '';
let lastPaymentId = null;
let paymentsRows = [];

// ── 認証 ──────────────────────────────────────────────────────────
async function login() {
  const input = document.getElementById('pwInput').value.trim();
  const err   = document.getElementById('loginErr');
  if (!input) return;

  err.textContent = '確認中...';
  const res = await fetch(`/api/admin?action=verify&password=${encodeURIComponent(input)}`);
  if (res.ok) {
    pw = input;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
  } else {
    err.textContent = 'パスワードが違います';
  }
}

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logoutBtn').addEventListener('click', () => {
  pw = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pwInput').value = '';
});

// ── タブ切替 ──────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const panel = document.getElementById('tab-' + tab.dataset.tab);
    panel.classList.add('active');

    if (tab.dataset.tab === 'payments' && paymentsRows.length === 0) loadPayments(true);
    if (tab.dataset.tab === 'artists') loadArtists();
  });
});

// ── 統計 ──────────────────────────────────────────────────────────
async function loadStats() {
  const res  = await fetch(`/api/admin?action=stats&password=${encodeURIComponent(pw)}`);
  const data = await res.json();
  if (!res.ok) { document.getElementById('statsContent').innerHTML = `<div class="loading-msg">${data.error}</div>`; return; }

  const walletColor = parseFloat(data.walletBalance) < 0.2 ? 'stat-warn' : '';

  let artworkRows = Object.entries(data.byArtwork || {})
    .sort((a,b) => b[1].amount - a[1].amount)
    .map(([name, v]) => `
      <div class="breakdown-card">
        <div class="breakdown-name">${name}</div>
        <div class="breakdown-count">${v.count} 件</div>
        <div class="breakdown-amount">¥${v.amount.toLocaleString()}</div>
      </div>`).join('');

  let dailyRows = Object.entries(data.daily || {})
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 14)
    .map(([date, v]) => `
      <tr>
        <td class="mono">${date}</td>
        <td>${v.count} 件</td>
        <td class="mono">¥${v.amount.toLocaleString()}</td>
      </tr>`).join('');

  document.getElementById('statsContent').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">TOTAL SALES</div>
        <div class="stat-value">¥${data.totalAmount.toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TOTAL ORDERS</div>
        <div class="stat-value">${data.totalCount}<span class="stat-unit">件</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">NFT MINTED</div>
        <div class="stat-value">${data.nftMintedCount}<span class="stat-unit">件</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">WALLET (POL)</div>
        <div class="stat-value ${walletColor}">${data.walletBalance}</div>
      </div>
    </div>

    <div class="section-title">作品別売上</div>
    <div class="breakdown-grid">${artworkRows || '<div style="color:rgba(255,255,255,0.2);font-size:12px;">データなし</div>'}</div>

    <div class="section-title" style="margin-top:28px;">日別売上（直近14日）</div>
    <table class="data-table">
      <thead><tr><th>日付</th><th>件数</th><th>金額</th></tr></thead>
      <tbody>${dailyRows || '<tr><td colspan="3" style="color:rgba(255,255,255,0.2);text-align:center;padding:24px;">データなし</td></tr>'}</tbody>
    </table>`;
}

// ── 売上一覧 ──────────────────────────────────────────────────────
async function loadPayments(reset = false) {
  if (reset) { paymentsRows = []; lastPaymentId = null; }
  const url = `/api/admin?action=payments&password=${encodeURIComponent(pw)}&limit=50${lastPaymentId ? '&starting_after=' + lastPaymentId : ''}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (!res.ok) { document.getElementById('paymentsContent').innerHTML = `<div class="loading-msg">${data.error}</div>`; return; }

  paymentsRows = paymentsRows.concat(data.data);
  lastPaymentId = data.last_id;
  document.getElementById('loadMoreBtn').style.display = data.has_more ? 'block' : 'none';

  const rows = paymentsRows.map(p => {
    const date = new Date(p.created * 1000).toLocaleString('ja-JP');
    const status = p.status === 'succeeded'
      ? '<span class="badge-ok">成功</span>'
      : p.status === 'requires_payment_method'
      ? '<span class="badge-ng">失敗</span>'
      : `<span class="badge-pend">${p.status}</span>`;
    const nft = p.nftMinted ? '<span class="badge-ok">発行済</span>' : '<span class="badge-ng">未発行</span>';
    const tx = p.txHash ? `<a class="tx-link" href="https://polygonscan.com/tx/${p.txHash}" target="_blank">${p.txHash.slice(0,10)}...</a>` : '—';
    return `<tr>
      <td class="mono" style="font-size:11px;">${date}</td>
      <td>${status}</td>
      <td class="mono">¥${p.amount.toLocaleString()}</td>
      <td>${p.artworkName || '—'}</td>
      <td style="font-size:11px;color:rgba(255,255,255,0.4);">${p.artistName || '—'}</td>
      <td style="font-size:11px;color:rgba(255,255,255,0.35);">${p.email || '—'}</td>
      <td>${nft}</td>
      <td>${tx}</td>
    </tr>`;
  }).join('');

  document.getElementById('paymentsContent').innerHTML = `
    <div style="overflow-x:auto;">
    <table class="data-table">
      <thead><tr><th>日時</th><th>状態</th><th>金額</th><th>作品名</th><th>作家名</th><th>メール</th><th>NFT</th><th>TX</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="8" style="color:rgba(255,255,255,0.2);text-align:center;padding:24px;">データなし</td></tr>'}</tbody>
    </table>
    </div>`;
}

function loadMore() { loadPayments(false); }

// ── 登録作品 ──────────────────────────────────────────────────────
async function loadArtists() {
  document.getElementById('artistsContent').innerHTML = '<div class="loading-msg">読み込み中...</div>';
  const res  = await fetch(`/api/admin?action=artists&password=${encodeURIComponent(pw)}`);
  const data = await res.json();
  if (!res.ok) { document.getElementById('artistsContent').innerHTML = `<div class="loading-msg">${data.error}</div>`; return; }

  const rows = data.data.map(a => {
    const date = new Date(a.createdAt).toLocaleString('ja-JP');
    const thumb = a.artworkUrl
      ? `<img class="artist-thumb" src="${a.artworkUrl}" onerror="this.style.display='none'">`
      : '<div class="artist-thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(200,169,110,0.3);">✦</div>';
    const glb  = a.glbUrl  ? '<span class="badge-ok">GLBあり</span>' : '<span class="badge-ng">なし</span>';
    const nftImg = a.nftImageUrl ? '<span class="badge-ok">画像あり</span>' : '<span class="badge-ng">なし</span>';
    const url = `/artist/${a.id}`;
    return `<tr>
      <td>${thumb}</td>
      <td><div class="artist-name">${a.name}</div><div class="artist-artwork">${a.artworkName || '—'}</div></td>
      <td class="mono">¥${Number(a.price || 0).toLocaleString()}</td>
      <td style="font-size:11px;color:rgba(255,255,255,0.4);">${a.genre || '—'}</td>
      <td>${glb}</td>
      <td>${nftImg}</td>
      <td style="font-size:11px;color:rgba(255,255,255,0.35);">${date}</td>
      <td><a class="tx-link" href="${url}" target="_blank">ARページ →</a></td>
    </tr>`;
  }).join('');

  document.getElementById('artistsContent').innerHTML = `
    <div style="overflow-x:auto;">
    <table class="data-table">
      <thead><tr><th></th><th>作家 / 作品</th><th>価格</th><th>ジャンル</th><th>GLB</th><th>NFT画像</th><th>登録日</th><th>リンク</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="8" style="color:rgba(255,255,255,0.2);text-align:center;padding:24px;">登録なし</td></tr>'}</tbody>
    </table>
    </div>`;
}
</script>
</body>
</html>
